<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Vitao — placeholder preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f4fc"/>
      <stop offset="1" stop-color="#e4f5f8"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7341b4"/>
      <stop offset="1" stop-color="#63c3d1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#bg)"/>

  <!-- app window -->
  <rect x="140" y="110" width="920" height="530" rx="18" fill="#ffffff" stroke="#e7e8ee" stroke-width="2"/>
  <circle cx="178" cy="146" r="7" fill="#ef6b63"/>
  <circle cx="206" cy="146" r="7" fill="#f3c34f"/>
  <circle cx="234" cy="146" r="7" fill="#5fcf80"/>
  <rect x="300" y="132" width="360" height="28" rx="14" fill="#f0f1f5"/>
  <text x="480" y="151" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" fill="#6b7280">vitao.io/review</text>
  <line x1="140" y1="178" x2="1060" y2="178" stroke="#eef0f4" stroke-width="2"/>

  <!-- heading -->
  <text x="172" y="234" font-family="Sora, Inter, sans-serif" font-size="30" font-weight="700" fill="#7341b4">AI review</text>

  <!-- résumé panel -->
  <rect x="172" y="266" width="430" height="320" rx="14" fill="#f5f3fb"/>
  <rect x="200" y="296" width="160" height="14" rx="7" fill="#e6e2f1"/>
  <rect x="200" y="328" width="374" height="10" rx="5" fill="#edeef3"/>
  <rect x="200" y="350" width="374" height="10" rx="5" fill="#edeef3"/>
  <rect x="200" y="372" width="320" height="10" rx="5" fill="#edeef3"/>
  <rect x="200" y="420" width="374" height="10" rx="5" fill="#edeef3"/>
  <rect x="200" y="442" width="300" height="10" rx="5" fill="#edeef3"/>

  <!-- AI suggestions panel -->
  <rect x="626" y="266" width="404" height="320" rx="14" fill="#ffffff" stroke="url(#brand)" stroke-width="2"/>
  <circle cx="660" cy="300" r="14" fill="url(#brand)"/>
  <rect x="686" y="294" width="160" height="12" rx="6" fill="#e6e2f1"/>
  <rect x="654" y="338" width="350" height="10" rx="5" fill="#edeef3"/>
  <rect x="654" y="360" width="320" height="10" rx="5" fill="#edeef3"/>
  <rect x="654" y="404" width="350" height="10" rx="5" fill="#edeef3"/>
