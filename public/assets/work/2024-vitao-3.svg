  <rect x="844" y="586" width="196" height="34" rx="17" fill="#ffffff" stroke="url(#brand)" stroke-width="2"/>
  <text x="942" y="608" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" letter-spacing="0.08em" fill="#7341b4">PLACEHOLDER</text>
