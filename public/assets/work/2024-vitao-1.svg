  <rect x="196" y="236" width="44" height="44" rx="10" fill="url(#brand)"/>
  <rect x="196" y="312" width="136" height="12" rx="6" fill="#e6e2f1"/>
  <rect x="196" y="344" width="110" height="12" rx="6" fill="#e6e2f1"/>
